<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Flying Heart</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
      cursor: pointer;
    }

    .hint {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.72);
      font-family: Arial, sans-serif;
      font-size: 14px;
      letter-spacing: 0.08em;
      pointer-events: none;
      user-select: none;
      text-transform: uppercase;
      text-align: center;
      text-shadow: 0 0 12px rgba(255,120,170,0.35);
    }
  </style>
</head>
<body>
  <canvas id="heartCanvas"></canvas>
  <div class="hint">Touch / hold / move mouse → heart<br>Release / stop touching → random flying pixels</div>

  <script>
    (() => {
      const canvas = document.getElementById('heartCanvas');
      const ctx = canvas.getContext('2d');

      let width = 0;
      let height = 0;
      let cx = 0;
      let cy = 0;
      let isHeartMode = false;
      let lastInteraction = 0;
      const HEART_HOLD_MS = 220;

      const isMobile = /android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini/i
        .test((navigator.userAgent || navigator.vendor || window.opera || '').toLowerCase());

      const config = {
        particleCount: isMobile ? 260 : 420,
        trailLength: isMobile ? 10 : 16,
        heartScale: isMobile ? 12 : 15,
        wanderForce: 0.18,
        targetForce: 0.12,
        damping: 0.92,
        jitter: 0.35,
        fadeAlpha: 0.18,
      };

      function resize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        width = Math.floor(window.innerWidth);
        height = Math.floor(window.innerHeight);
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        canvas.style.width = width + 'px';
        canvas.style.height = height + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        cx = width / 2;
        cy = height / 2;
        rebuildHeartTargets();
      }

      function heartPosition(t) {
        return {
          x: 16 * Math.pow(Math.sin(t), 3),
          y: -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t))
        };
      }

      let heartTargets = [];
      function rebuildHeartTargets() {
        heartTargets = [];
        const baseScale = Math.min(width, height) / 38;
        for (let layer = 1; layer <= 3; layer++) {
          const shrink = 1 - layer * 0.18;
          const step = isMobile ? 0.18 : 0.11;
          for (let t = 0; t < Math.PI * 2; t += step) {
            const p = heartPosition(t);
            heartTargets.push({
              x: cx + p.x * baseScale * shrink,
              y: cy + p.y * baseScale * shrink
            });
          }
        }
      }

      function randomColor() {
        const hue = 340 + Math.random() * 20;
        const sat = 70 + Math.random() * 20;
        const light = 58 + Math.random() * 18;
        return `hsla(${hue}, ${sat}%, ${light}%, 0.9)`;
      }

      class Particle {
        constructor(index) {
          this.index = index;
          this.reset(true);
        }

        reset(first = false) {
          this.x = Math.random() * width;
          this.y = Math.random() * height;
          this.vx = (Math.random() - 0.5) * 2.2;
          this.vy = (Math.random() - 0.5) * 2.2;
          this.size = Math.random() < 0.7 ? 1 : 2;
          this.color = randomColor();
          this.wanderAngle = Math.random() * Math.PI * 2;
          this.wanderRadius = 40 + Math.random() * 90;
          this.orbitSpeed = 0.01 + Math.random() * 0.02;
          this.trace = [];
          for (let i = 0; i < config.trailLength; i++) {
            this.trace.push({ x: this.x, y: this.y });
          }
          if (!first) this.targetIndex = Math.floor(Math.random() * heartTargets.length);
          else this.targetIndex = index % Math.max(heartTargets.length || 1, 1);
        }

        get target() {
          return heartTargets[this.targetIndex % heartTargets.length] || { x: cx, y: cy };
        }

        update(time) {
          if (isHeartMode) {
            const tx = this.target.x;
            const ty = this.target.y;
            const dx = tx - this.x;
            const dy = ty - this.y;
            const dist = Math.hypot(dx, dy) || 1;

            this.vx += (dx / dist) * config.targetForce * Math.min(dist * 0.08, 5.5);
            this.vy += (dy / dist) * config.targetForce * Math.min(dist * 0.08, 5.5);

            if (dist < 8 && Math.random() < 0.02) {
              this.targetIndex = (this.targetIndex + 1 + Math.floor(Math.random() * 3)) % heartTargets.length;
            }
          } else {
            this.wanderAngle += this.orbitSpeed;
            const rx = cx + Math.cos(this.wanderAngle + this.index * 0.17) * this.wanderRadius;
            const ry = cy + Math.sin(this.wanderAngle * 1.3 + this.index * 0.11) * this.wanderRadius;
            const dx = rx - this.x;
            const dy = ry - this.y;
            const dist = Math.hypot(dx, dy) || 1;

            this.vx += (dx / dist) * config.wanderForce;
            this.vy += (dy / dist) * config.wanderForce;
            this.vx += (Math.random() - 0.5) * config.jitter;
            this.vy += (Math.random() - 0.5) * config.jitter;
          }

          this.vx *= config.damping;
          this.vy *= config.damping;
          this.x += this.vx;
          this.y += this.vy;

          if (!isHeartMode) {
            if (this.x < -20) this.x = width + 20;
            if (this.x > width + 20) this.x = -20;
            if (this.y < -20) this.y = height + 20;
            if (this.y > height + 20) this.y = -20;
          }

          this.trace[0].x = this.x;
          this.trace[0].y = this.y;
          for (let i = 1; i < this.trace.length; i++) {
            this.trace[i].x += (this.trace[i - 1].x - this.trace[i].x) * 0.35;
            this.trace[i].y += (this.trace[i - 1].y - this.trace[i].y) * 0.35;
          }
        }

        draw() {
          ctx.fillStyle = this.color;
          for (let i = this.trace.length - 1; i >= 0; i--) {
            const p = this.trace[i];
            const alpha = (i + 1) / this.trace.length;
            ctx.globalAlpha = alpha * 0.9;
            ctx.fillRect(p.x, p.y, this.size, this.size);
          }
        }
      }

      let particles = [];
      function buildParticles() {
        particles = [];
        for (let i = 0; i < config.particleCount; i++) {
          particles.push(new Particle(i));
        }
      }

      function activateHeart() {
        isHeartMode = true;
        lastInteraction = performance.now();
      }

      function releaseHeartSoon() {
        lastInteraction = performance.now();
      }

      canvas.addEventListener('pointerdown', (e) => {
        canvas.setPointerCapture?.(e.pointerId);
        activateHeart();
      });

      canvas.addEventListener('pointermove', (e) => {
        if ((e.buttons && e.buttons > 0) || e.pointerType === 'touch') {
          activateHeart();
        }
      });

      canvas.addEventListener('pointerup', releaseHeartSoon);
      canvas.addEventListener('pointercancel', releaseHeartSoon);
      canvas.addEventListener('pointerleave', releaseHeartSoon);

      window.addEventListener('resize', () => {
        resize();
        buildParticles();
      });

      function animate(time) {
        if (isHeartMode && time - lastInteraction > HEART_HOLD_MS) {
          isHeartMode = false;
        }

        ctx.globalAlpha = 1;
        ctx.fillStyle = `rgba(0,0,0,${config.fadeAlpha})`;
        ctx.fillRect(0, 0, width, height);

        for (const p of particles) {
          p.update(time);
          p.draw();
        }

        requestAnimationFrame(animate);
      }

      resize();
      buildParticles();
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, width, height);
      requestAnimationFrame(animate);
    })();
  </script>
</body>
</html>
