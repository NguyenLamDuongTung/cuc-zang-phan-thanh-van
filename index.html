<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cuc zang Phan Thanh Van</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050505;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      touch-action: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>

<script>
(() => {
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  let w = 0;
  let h = 0;
  let cx = 0;
  let cy = 0;

  const PARTICLE_COUNT = 4200;
  const particles = [];

  let attractToHeart = false;
  let pointerX = 0;
  let pointerY = 0;
  let frame = 0;

  const DISPLAY_TEXT = "iu em Phan Thanh Vân";
  let textTargets = [];

  function rand(min, max) {
    return Math.random() * (max - min) + min;
  }

  function heartPoint(a, scale) {
    const x = 16 * Math.pow(Math.sin(a), 3);
    const y =
      13 * Math.cos(a) -
      5 * Math.cos(2 * a) -
      2 * Math.cos(3 * a) -
      Math.cos(4 * a);

    return {
      x: x * scale,
      y: -y * scale
    };
  }

  function buildTextTargets() {
    const off = document.createElement("canvas");
    const offCtx = off.getContext("2d");

    off.width = w;
    off.height = h;

    const fontSize = Math.max(30, Math.min(w * 0.042, 58));
    offCtx.clearRect(0, 0, off.width, off.height);
    offCtx.fillStyle = "white";
    offCtx.textAlign = "center";
    offCtx.textBaseline = "middle";
    offCtx.font = `700 ${fontSize}px "Dancing Script", cursive`;

    const textY = cy + Math.min(h * 0.09, 52);
    offCtx.fillText(DISPLAY_TEXT, cx, textY);

    const img = offCtx.getImageData(0, 0, off.width, off.height).data;
    const points = [];
    const gap = Math.max(4, Math.floor(fontSize / 10));

    for (let y = 0; y < off.height; y += gap) {
      for (let x = 0; x < off.width; x += gap) {
        const idx = (y * off.width + x) * 4;
        if (img[idx + 3] > 140) {
          points.push({ x, y });
        }
      }
    }

    textTargets = points;
  }

  function buildParticles() {
    particles.length = 0;
    buildTextTargets();

    const baseScale = Math.min(w, h) * 0.0195;
    const textCount = Math.min(textTargets.length, Math.floor(PARTICLE_COUNT * 0.22));

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      const a = Math.random() * Math.PI * 2;
      const hp = heartPoint(a, baseScale);

      let group = "inner";
      let ox = hp.x;
      let oy = hp.y;
      let size = 1.2;
      let alpha = 0.8;
      let pulseAmp = 1.0;
      let textTarget = null;

      if (i < textCount) {
        group = "text";
        textTarget = textTargets[i % textTargets.length];

        ox += rand(-4, 4);
        oy += rand(-4, 4);
        size = rand(1.0, 2.1);
        alpha = rand(0.72, 1.0);
        pulseAmp = rand(1.00, 1.05);
      } else {
        const r = Math.random();

        if (r < 0.50) group = "edge";
        else if (r < 0.80) group = "aura";
        else group = "inner";

        if (group === "edge") {
          ox += rand(-2.2, 2.2);
          oy += rand(-2.2, 2.2);
          size = rand(1.2, 2.5);
          alpha = rand(0.82, 1.0);
          pulseAmp = rand(1.02, 1.10);
        } else if (group === "inner") {
          const inward = rand(0.55, 0.92);
          ox *= inward;
          oy *= inward;
          ox += rand(-10, 10);
          oy += rand(-10, 10);
          size = rand(0.8, 1.7);
          alpha = rand(0.20, 0.55);
          pulseAmp = rand(0.98, 1.04);
        } else {
          const outward = rand(1.03, 1.18);
          ox *= outward;
          oy *= outward;
          ox += rand(-16, 16);
          oy += rand(-16, 16);
          size = rand(0.9, 2.0);
          alpha = rand(0.30, 0.75);
          pulseAmp = rand(1.04, 1.18);
        }
      }

      particles.push({
        x: rand(0, w),
        y: rand(0, h),
        vx: rand(-1.4, 1.4),
        vy: rand(-1.4, 1.4),
        baseOx: ox,
        baseOy: oy,
        tx: cx + ox,
        ty: cy + oy,
        size,
        alpha,
        group,
        flicker: rand(0, Math.PI * 2),
        drift: rand(0, Math.PI * 2),
        pulseAmp,
        textTarget
      });
    }
  }

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    cx = w / 2;
    cy = h / 2;
    buildParticles();
  }

  function heartbeat(f) {
    if (!attractToHeart) return 1;

    const t = f * 0.095;
    const beat1 = Math.pow(Math.max(0, Math.sin(t)), 14) * 0.19;
    const beat2 = Math.pow(Math.max(0, Math.sin(t - 0.72)), 20) * 0.11;
    const settle = Math.sin(t * 0.5) * 0.008;

    return 1 + beat1 + beat2 + settle;
  }

  function updateParticles() {
    const beat = heartbeat(frame);

    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];

      if (attractToHeart) {
        if (p.group === "text" && p.textTarget) {
          const tx = cx + (p.textTarget.x - cx) * (0.985 + (beat - 1) * 0.25);
          const ty = cy + (p.textTarget.y - cy) * (0.985 + (beat - 1) * 0.25);

          p.tx = tx + Math.sin(frame * 0.06 + p.drift) * 0.8;
          p.ty = ty + Math.cos(frame * 0.06 + p.drift) * 0.8;
        } else {
          const auraWave = p.group === "aura" ? Math.sin(frame * 0.06 + p.drift) * 6.5 : 0;
          const edgeWave = p.group === "edge" ? Math.sin(frame * 0.08 + p.drift) * 1.5 : 0;
          const innerWave = p.group === "inner" ? Math.sin(frame * 0.05 + p.drift) * 2.0 : 0;
          const wave = auraWave + edgeWave + innerWave;

          const scale = beat * p.pulseAmp;
          const ox = p.baseOx * scale;
          const oy = p.baseOy * scale;

          const len = Math.hypot(p.baseOx, p.baseOy) || 1;
          const nx = p.baseOx / len;
          const ny = p.baseOy / len;

          p.tx = cx + ox + nx * wave;
          p.ty = cy + oy + ny * wave;
        }

        const dx = p.tx - p.x;
        const dy = p.ty - p.y;

        const pull = p.group === "text" ? 0.0050 : 0.0042;
        const damp = p.group === "text" ? 0.82 : 0.83;

        p.vx += dx * pull;
        p.vy += dy * pull;

        p.vx *= damp;
        p.vy *= damp;
      } else {
        p.vx += Math.sin((frame + i) * 0.012 + p.drift) * 0.022;
        p.vy += Math.cos((frame + i) * 0.014 + p.drift) * 0.022;

        const dxm = p.x - pointerX;
        const dym = p.y - pointerY;
        const dist2 = dxm * dxm + dym * dym;

        if (dist2 < 16000) {
          const force = 16000 / (dist2 + 1);
          p.vx += dxm * force * 0.00003;
          p.vy += dym * force * 0.00003;
        }

        p.vx *= 0.994;
        p.vy *= 0.994;
      }

      p.x += p.vx;
      p.y += p.vy;

      if (!attractToHeart) {
        if (p.x < -20) p.x = w + 20;
        if (p.x > w + 20) p.x = -20;
        if (p.y < -20) p.y = h + 20;
        if (p.y > h + 20) p.y = -20;
      }
    }
  }

  function drawParticles() {
    ctx.clearRect(0, 0, w, h);

    if (attractToHeart) {
      const beat = heartbeat(frame);
      const glow = ctx.createRadialGradient(
        cx, cy, 0,
        cx, cy, Math.min(w, h) * 0.24 * beat
      );
      glow.addColorStop(0, "rgba(255,185,205,0.09)");
      glow.addColorStop(0.45, "rgba(255,120,150,0.045)");
      glow.addColorStop(1, "rgba(255,90,130,0)");

      ctx.beginPath();
      ctx.fillStyle = glow;
      ctx.arc(cx, cy, Math.min(w, h) * 0.24 * beat, 0, Math.PI * 2);
      ctx.fill();
    }

    if (attractToHeart) {
      ctx.save();
      ctx.shadowBlur = 20;
      ctx.shadowColor = "rgba(255,220,230,0.95)";

      for (const p of particles) {
        if (p.group !== "edge") continue;

        const flick = 0.9 + 0.1 * Math.sin(frame * 0.09 + p.flicker);
        const a = Math.min(1, p.alpha * flick);

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * 1.25, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 244, 248, ${a})`;
        ctx.fill();
      }

      ctx.restore();
    }

    if (attractToHeart) {
      ctx.save();
      ctx.shadowBlur = 10;
      ctx.shadowColor = "rgba(255,235,245,0.9)";

      for (const p of particles) {
        if (p.group !== "text") continue;

        const flick = 0.90 + 0.10 * Math.sin(frame * 0.10 + p.flicker);
        const a = Math.min(1, p.alpha * flick);

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * 1.08, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 248, 252, ${a})`;
        ctx.fill();
      }

      ctx.restore();
    }

    for (const p of particles) {
      const flick = 0.82 + 0.18 * Math.sin(frame * 0.08 + p.flicker);
      let a = p.alpha * flick;
      let color = "";

      if (attractToHeart) {
        if (p.group === "edge") {
          color = `rgba(255, 228, 236, ${Math.min(1, a)})`;
        } else if (p.group === "aura") {
          color = `rgba(255, 165, 190, ${a * 0.95})`;
        } else if (p.group === "text") {
          color = `rgba(255, 242, 248, ${Math.min(1, a)})`;
        } else {
          color = `rgba(255, 110, 145, ${a * 0.60})`;
        }
      } else {
        color = `rgba(255, 95, 130, ${a * 0.88})`;
      }

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
    }
  }

  function animate() {
    frame++;
    updateParticles();
    drawParticles();
    requestAnimationFrame(animate);
  }

  function setPointer(e) {
    const rect = canvas.getBoundingClientRect();

    if (e.touches && e.touches.length > 0) {
      pointerX = e.touches[0].clientX - rect.left;
      pointerY = e.touches[0].clientY - rect.top;
    } else {
      pointerX = e.clientX - rect.left;
      pointerY = e.clientY - rect.top;
    }
  }

  canvas.addEventListener("mousedown", (e) => {
    setPointer(e);
    attractToHeart = true;
  });

  canvas.addEventListener("mousemove", (e) => {
    setPointer(e);
  });

  window.addEventListener("mouseup", () => {
    attractToHeart = false;
  });

  canvas.addEventListener("touchstart", (e) => {
    setPointer(e);
    attractToHeart = true;
  }, { passive: true });

  canvas.addEventListener("touchmove", (e) => {
    setPointer(e);
  }, { passive: true });

  window.addEventListener("touchend", () => {
    attractToHeart = false;
  });

  window.addEventListener("resize", resize);

  resize();
  animate();
})();
</script>
</body>
</html>
